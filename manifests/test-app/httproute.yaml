apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx
  namespace: test-app
spec:
  parentRefs:
  - name: homelab-gateway
    namespace: kube-system
  hostnames:
  - "test-app.homelab.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: nginx
      port: 8080
